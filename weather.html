<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Analyzer</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>
    <button id="theme-toggle" class="theme-toggle">🌙</button>
    <canvas id="weather-canvas"></canvas>
    <header>
        <div class="symbol">
            Forecast
        </div>
        <div class="search-container">
            <input type="text" id="search-city" placeholder="Search your destination">
        </div>
    </header>
    <main class="main-weather">
        <div id="loading" style="display:none; text-align:center; margin-bottom:20px;">Loading weather data...</div>
        <h1 class="location" id="current-location"></h1>
        <div class="temperature" id="current-temperature"></div>
        <div class="description" id="current-description"></div>
        <div class="metric-grid" id="metric-container"></div>
        <div class="weather-details">
            <p>Feels like: <span id="feels-like"></span></p>
            <p>High: <span id="high-temp"></span>, Low: <span id="low-temp"></span></p>
            <p>Humidity: <span id="humidity"></span></p>
            <p>Wind Speed: <span id="wind-speed"></span></p>
            <p>AQI Level: <span id="aqi-level"></span></p>
            <img id="current-weather-icon">
        </div>
    </main>
    <section class="forecast-select">
        <h2 class="forecast-type">Daily Forecast</h2>
        <div class="forecast-grid" id="forecast-container"></div>
    </section>
    <div class="climate-section">
    <h2>Climate Projection</h2>
    <p class="projection-label">Years Ahead:<span id="year-value">5</span></p>
    <input type="range" id="year-slider" min="5" max="50" step="5" value="5">
    <button id="predict-btn">Predict Climate</button>
    <div id="climate-result"></div>
</div>
    <script src="weather-animations.js"></script>
    <script src="weather.js"></script>
</body>
</html>
